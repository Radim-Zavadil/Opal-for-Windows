<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Focus Interrupted</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background-color: #0d8253; /* Deep green from provided screenshot */
      color: #ffffff;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      text-align: center;
    }
    .emoji-img {
      width: 90px;
      margin-bottom: 25px;
    }
    h2 {
      font-size: 26px;
      font-weight: 500;
      margin: 0 0 5px 0;
    }
    h1 {
      font-size: 42px;
      font-weight: 700;
      margin: 0 0 5px 0;
    }
    h2.subtitle {
      font-size: 32px;
      font-weight: 600;
      margin: 0 0 5px 0;
    }
    h2.subtitle-bold {
      font-size: 32px;
      font-weight: 700;
      margin: 0 0 25px 0;
    }
    p.quote {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.85);
      font-weight: 400;
      max-width: 450px;
      margin: 0 auto 50px auto;
      line-height: 1.5;
    }
    .buttons-container {
      display: flex;
      gap: 15px;
      position: absolute;
      bottom: 50px;
    }
    .btn {
      background: #ffffff;
      color: #0d8253;
      border: none;
      padding: 12px 30px;
      border-radius: 30px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn:hover {
      opacity: 0.9;
      transform: scale(1.02);
    }
    .btn-secondary {
      background: rgba(255, 255, 255, 0.2);
      color: #ffffff;
      box-shadow: none;
    }
    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.3);
    }
    
    .drag-area {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 30px;
      -webkit-app-region: drag;
    }
  </style>
</head>
<body>
  <div class="drag-area"></div>
  
  <img src="images/angry_face_emoji.png" alt="Emoji" class="emoji-img" onerror="this.style.display='none'">
  
  <h2>The</h2>
  <h1 id="app-name">App/Site</h1>
  <h2 class="subtitle">Show Must Go On...</h2>
  <h2 class="subtitle-bold">Without You!</h2>
  
  <p class="quote">This app is currently starring without you. Take a break and write your own real-life script.</p>
  
  <div class="buttons-container">
    <button class="btn btn-secondary" id="btn-continue">Continue to App/Site</button>
    <button class="btn" id="btn-close">Close App/Site</button>
  </div>

  <script>
    const { ipcRenderer } = require('electron');
    
    document.getElementById('btn-continue').addEventListener('click', () => {
      ipcRenderer.send('close-interrupt', document.getElementById('app-name').innerText);
    });

    document.getElementById('btn-close').addEventListener('click', () => {
      // Attempt to close the app/site if needed, or simply hide the overlay
      // Given we just want to help them back out, we let them close it smoothly.
      ipcRenderer.send('close-interrupt-and-app', document.getElementById('app-name').innerText);
    });

    ipcRenderer.on('set-blocked-app', (event, appName) => {
      document.getElementById('app-name').innerText = appName;
    });
  </script>
</body>
</html>
