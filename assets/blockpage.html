<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Focus Mode - Blocked</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>

  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background-color: #121212;
      color: #ffffff;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      text-align: center;
    }
    .icon {
      font-size: 80px;
      margin-bottom: 20px;
      color: #a8f0ef;
    }
    h1 {
      font-size: 48px;
      font-weight: 500;
      margin-bottom: 10px;
      background: linear-gradient(90deg, #d3ffd0 0%, #a8f0ef 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p.quote {
      font-size: 20px;
      color: #a0a0a0;
      font-weight: 500;
      max-width: 600px;
      margin-bottom: 40px;
      line-height: 1.5;
    }
    .counter {
      background-color: #242424;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 500;
      color: #a0a0a0;
      margin-bottom: 40px;
    }
    .btn {
      background: linear-gradient(90deg, #d3ffd0 0%, #a8f0ef 100%);
      color: #121212;
      border: none;
      padding: 15px 40px;
      border-radius: 30px;
      font-size: 18px;
      font-weight: 500;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(168, 240, 239, 0.3);
      transition: opacity 0.2s;
    }
    .btn:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <i class="ph ph-shield-check icon"></i>
  <h1 id="headline">Work On Success, Not This Site</h1>
  <p class="quote">"Discipline is choosing between what you want now and what you want most."</p>
  <div class="counter" id="counter">Site blocked today: 1</div>
  <button class="btn" onclick="window.history.back()">Work It!</button>

</body>
</html>
