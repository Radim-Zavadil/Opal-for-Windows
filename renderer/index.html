<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Focus Mode</title>

  <!-- Inter Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">

  <!-- Phosphor Icons -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>

  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="drag-bar"></div>

  <div class="sidebar">
    <button class="new-block-btn" id="btn-new-block">
      <i class="ph ph-plus"></i> <span style="font-weight: 600;">New Block</span>
    </button>
    <nav>
      <a href="#" class="nav-item active" data-target="view-blocks">
        <i class="ph ph-squares-four icon gradient-icon"></i> Blocks
      </a>
      <a href="#" class="nav-item" data-target="view-settings">
        <i class="ph ph-gear icon gradient-icon"></i> Settings
      </a>
      <a href="#" class="nav-item" data-target="view-feedback">
        <i class="ph ph-chat-circle icon gradient-icon"></i> Give Feedback
      </a>
    </nav>
    <div class="user-profile">
      <div class="avatar"><i class="ph ph-user"></i></div> User
    </div>
  </div>

  <main class="content">

    <!-- Blocks View -->
    <div id="view-blocks" class="view active">
      <header>
        <h1>Blocks</h1>

      </header>

      <section class="now-section" id="active-session-container" style="display: none;">
        <h2>Now</h2>
        <div class="active-session-card">
          <div class="session-info">
            <div id="session-icon-container">
              <i class="ph ph-diamond session-icon" style="color: #a0a0a0;"></i>
            </div>
            <div>
              <h3 id="session-name">My Session</h3>
              <p id="session-time">Remaining 6:18:40</p>
            </div>
          </div>
          <div class="status-badge" id="session-status">
            <span class="dot" id="session-status-dot"></span> <span id="session-status-text">Blocking</span> · <span
              id="session-count">5</span>
          </div>
          <button class="add-btn" id="btn-stop-session" style="color: #ff6b6b; border-color: #ff6b6b;">Stop</button>
          <button class="add-btn" id="btn-resume-session"
            style="display: none; color: #a0a0a0; border-color: #a0a0a0;">Resume</button>
          <button class="add-btn" id="btn-clear-session"
            style="display: none; color: #a0a0a0; border-color: #a0a0a0;">Clear</button>
        </div>
      </section>

      <section class="more-ideas-section">
        <h2>More Ideas:</h2>
        <div class="action-buttons" style="grid-template-columns: 1fr;">
          <button class="primary-btn" id="btn-block-now">
            <i class="ph ph-play icon gradient-icon"></i> Block Now
          </button>
        </div>

        <div class="presets-list" id="presets-container">
          <!-- Populated by JS -->
        </div>
      </section>
    </div>

    <!-- Settings View -->
    <div id="view-settings" class="view">
      <header>
        <h1>Settings</h1>
      </header>
      <section>
        <p style="color: var(--text-secondary);">Manage your Focus Mode preferences.</p>
        <div class="form-group" style="margin-top: 20px;">
          <label>Default Session Duration (minutes)</label>
          <input type="number" id="setting-default-duration" value="60">
        </div>
        <div class="form-group" style="margin-top: 20px;">
          <label>Global Session Background <span style="font-size: 12px; color: #a0a0a0;">(Applies to all sessions)</span></label>
          <div style="display: flex; align-items: center; gap: 15px;">
            <div id="setting-bg-preview" style="width: 120px; height: 68px; background: #333; border-radius: 8px; overflow: hidden; display: flex; align-items: center; justify-content: center;">
              <i class="ph ph-image" style="color: #a0a0a0; font-size: 24px;"></i>
            </div>
            <div style="position: relative; overflow: hidden; border-radius: 8px;">
              <div class="secondary-btn" style="cursor: pointer; padding: 8px 16px; font-size: 13px; text-align: center;">Upload Image</div>
              <input type="file" id="setting-bg-upload" accept="image/*" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer;">
            </div>
            <button class="btn-delete" id="btn-clear-setting-bg" style="display: none; padding: 8px 16px; margin: 0;">Clear</button>
          </div>
        </div>
        <button class="btn-submit" id="btn-save-settings"
          style="padding: 10px 20px; border-radius: 10px; border:none; cursor:pointer;">Save Settings</button>
      </section>
    </div>

    <!-- Feedback View -->
    <div id="view-feedback" class="view">
      <header>
        <h1>Give Feedback</h1>
      </header>
      <section>
        <div class="form-group">
          <label>What's on your mind?</label>
          <textarea rows="5" placeholder="Share your thoughts..."></textarea>
        </div>
        <button class="btn-submit" style="padding: 10px 20px; border-radius: 10px; border:none; cursor:pointer;">Send
          Message</button>
      </section>
    </div>

    <!-- Active Session View -->
    <div id="view-active-session" class="view" style="height: calc(100vh - 100px); position: relative;">
      <header style="display: flex; justify-content: space-between; align-items: center;">
        <button class="icon-btn" id="btn-back-to-blocks"
          style="position: relative; z-index: 10; background: transparent; color: #a0a0a0; padding: 10px; border: none; cursor: pointer;"><i
            class="ph ph-caret-left" style="font-size: 24px;"></i></button>
      </header>
      <img id="active-session-bg"
        style="position: absolute; top: -50px; left: -50px; width: calc(100% + 100px); height: calc(100% + 100px); z-index: 0; object-fit: cover; opacity: 0.5; pointer-events: none; display: none;" />
      <div id="active-session-bg-overlay"
        style="position: absolute; top: -50px; left: -50px; width: calc(100% + 100px); height: calc(100% + 100px); z-index: 1; pointer-events: none; display: none; box-shadow: inset 0 0 200px 100px rgba(0,0,0,0.9);"></div>



      <div class="timeline-container">
        <div
          style="display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 20px; padding: 0 20px; gap: 15px;">
          <div style="display: flex; align-items: baseline; gap: 15px;">
            <h2 id="detail-session-title" style="font-size: 24px; font-weight: 500; color: white; margin: 0;"></h2>
            <span id="detail-session-time" style="color: #a0a0a0; font-size: 14px; font-weight: 500;"></span>
          </div>
          <div>
            <button class="add-btn" id="btn-detail-stop-session"
              style="position: relative; z-index: 10; color: #a0a0a0; border-color: #a0a0a0;">Stop</button>
            <button class="add-btn" id="btn-detail-resume-session"
              style="display: none; position: relative; z-index: 10; color: #a0a0a0; border-color: #a0a0a0;">Resume</button>
            <button class="add-btn" id="btn-detail-clear-session"
              style="display: none; position: relative; z-index: 10; color: #a0a0a0; border-color: #a0a0a0;">Clear</button>
          </div>
        </div>
        <div class="timeline-track">
          <div class="timeline-fill" id="timeline-fill"></div>
        </div>
      </div>
    </div>

  </main>

  <!-- Modals -->
  <div class="modal-overlay" id="modal-new-block">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-editable-title" contenteditable="true">Focus Session</h2>
        <button class="close-modal"><i class="ph ph-x"></i></button>
      </div>
      <div class="modal-body">
        <div class="modal-rows-container">
          <div class="modal-row">
            <div class="modal-row-left">
              <i class="ph ph-clock"></i>
              <span>Time</span>
            </div>
            <div class="modal-row-right time-inputs">
              <input type="number" id="input-hours" value="1" min="0"> <span class="unit">h</span>
              <input type="number" id="input-minutes" value="0" min="0" max="59"> <span class="unit">m</span>
            </div>
          </div>

          <div class="modal-row">
            <div class="modal-row-left">
              <i class="ph ph-globe"></i>
              <span>Blocked Websites</span>
            </div>
            <div class="modal-row-right">
              <input type="text" id="input-session-sites" placeholder="youtube.com, ...">
            </div>
          </div>

          <div class="modal-row">
            <div class="modal-row-left">
              <i class="ph ph-app-window"></i>
              <span>Blocked Apps</span>
            </div>
            <div class="modal-row-right">
              <input type="text" id="input-session-apps" placeholder="notepad.exe, ...">
            </div>
          </div>

          <div class="modal-row" id="row-icon-upload">
            <div class="modal-row-left">
              <i class="ph ph-image"></i>
              <span>Session Icon</span>
            </div>
            <div class="modal-row-right icon-upload-cell">
              <div id="modal-icon-preview" class="icon-preview-circle"><i class="ph ph-star"></i></div>
              <label for="input-session-icon" class="upload-label">Upload</label>
              <input type="file" id="input-session-icon" accept="image/*" style="display: none;">
            </div>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-delete" id="btn-delete-preset" style="display: none;">Delete</button>
        <div style="flex-grow: 1;"></div>
        <button class="btn-cancel-text close-modal-btn">Cancel</button>
        <button class="btn-submit" id="btn-start-session-submit">Start Now</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>

</html>
